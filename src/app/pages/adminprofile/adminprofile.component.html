<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">
                👤 Admin Profile
            </h3>

        </div>

        <div class="card-body">

            <div class="row">

                <!-- Profile Photo -->

                <div class="col-md-3 text-center">

                   <img *ngIf="admin?.photoUrl" [src]="'http://localhost:8085/uploads/' + admin.photoUrl"
                        class="img-fluid rounded-circle border shadow" width="180" height="180">

                    <img *ngIf="!admin?.photoUrl" src="assets/images/user.png"
                        class="img-fluid rounded-circle border shadow" width="180" height="180">

                    <br><br>

                    <input type="file" class="form-control" (change)="selectFile($event)">

                    <br>

                    <button class="btn btn-primary w-100" (click)="uploadPhoto()">

                        <i class="bi bi-upload"></i>
                        Upload Photo

                    </button>

                </div>

                <!-- Profile Details -->

                <div class="col-md-9">

                    <div class="mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input type="text" class="form-control" [(ngModel)]="admin.fullName">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input type="text" class="form-control" [(ngModel)]="admin.username">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email" class="form-control" [(ngModel)]="admin.email">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Role
                        </label>

                        <input type="text" class="form-control" [value]="admin.role" readonly>

                    </div>

                    <div class="mt-4">

                        <button class="btn btn-success me-2" (click)="updateProfile()">

                            <i class="bi bi-check-circle"></i>
                            Update Profile

                        </button>

                        <button class="btn btn-warning" routerLink="/admin-change-password">

                            <i class="bi bi-lock-fill"></i>
                            Change Password

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>
