<div class="container mt-5">

  <div class="card p-4">

    <h2>Admin Login</h2>

    <input
      class="form-control"
      placeholder="Username"
      [(ngModel)]="admin.username">

    <br>

    <input
      type="password"
      class="form-control"
      placeholder="Password"
      [(ngModel)]="admin.password">

    <br>

    <button class="btn btn-primary" (click)="login()">
      Login
    </button>

    <br>

    <p style="color:red">{{message}}</p>

  </div>

</div>
