<div class="container mt-4">

    <h2 class="mb-4">Add Student Bus Assignment</h2>

    <form [formGroup]="assignmentForm" (ngSubmit)="saveAssignment()">

        <!-- Student Dropdown -->

        <div class="mb-3">

            <label class="form-label">Student</label>

            <select class="form-select" formControlName="studentId">

                <option value="">-- Select Student --</option>

                <option *ngFor="let student of students" [value]="student.studentId">

                    {{ student.name }} ({{ student.rollNo }})

                </option>

            </select>

        </div>

        <!-- Bus Dropdown -->

        <div class="mb-3">

            <label class="form-label">Bus</label>

            <select class="form-select" formControlName="busId">

                <option value="">-- Select Bus --</option>

                <option *ngFor="let bus of buses" [value]="bus.busId">

                    {{ bus.busNo }} ({{ bus.registrationNumber }})

                </option>

            </select>

        </div>

        <!-- Route Dropdown -->

        <div class="mb-3">

            <label class="form-label">Route</label>

            <select class="form-select" formControlName="routeId">

                <option value="">-- Select Route --</option>

                <option *ngFor="let route of routes" [value]="route.routeId">

                    {{ route.routeName }} ({{ route.startPoint }} → {{ route.endPoint }})

                </option>

            </select>

        </div>
        <!-- Assigned Date -->

        <div class="mb-3">

            <label class="form-label">Assigned Date</label>

            <input type="date" class="form-control" formControlName="assignedDate">

        </div>

        <!-- Status -->

        <div class="mb-3">

            <label class="form-label">Status</label>

            <select class="form-select" formControlName="isActive">

                <option [ngValue]="true">
                    Active
                </option>

                <option [ngValue]="false">
                    Inactive
                </option>

            </select>

        </div>

        <!-- Buttons -->

        <button type="submit" class="btn btn-success me-2">

            Save

        </button>

        <button type="button" class="btn btn-secondary" routerLink="/student-bus-assignment">

            Cancel

        </button>

    </form>

</div>
