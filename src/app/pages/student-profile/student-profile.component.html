<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4>My Profile</h4>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>Name</th>
                    <td>{{student.name}}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{student.email}}</td>
                </tr>

                <tr>
                    <th>Roll Number</th>
                    <td>{{student.rollNo}}</td>
                </tr>

                <tr>
                    <th>Department</th>
                    <td>{{student.department}}</td>
                </tr>

                <tr>
                    <th>Year</th>
                    <td>{{student.year}}</td>
                </tr>

                <tr>
                    <th>Bus Pass Number</th>
                    <td>{{student.busPassNumber}}</td>
                </tr>

            </table>

        </div>

    </div>

</div>
