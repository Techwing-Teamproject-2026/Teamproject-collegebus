<div class="container mt-4">

    <div class="card p-4 shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0">Add Bus</h2>
            <button class="btn btn-secondary btn-sm" routerLink="/buses">
                <i class="bi bi-arrow-left"></i> Back to Buses
            </button>
        </div>

        <form [formGroup]="busForm">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label>Bus Number</label>

                <input
                    type="text"
                    class="form-control"
                    formControlName="busNo">

            </div>

            <div class="col-md-6 mb-3">

                <label>Registration Number</label>

                <input
                    type="text"
                    class="form-control"
                    formControlName="registrationNumber">

            </div>

            <div class="col-md-6 mb-3">

                <label>Capacity</label>

                <input
                    type="number"
                    class="form-control"
                    formControlName="capacity">

            </div>

            <div class="col-md-6 mb-3">

                <label>Current Latitude</label>

                <input
                    type="number"
                    class="form-control"
                    formControlName="currentLat">

            </div>

            <div class="col-md-6 mb-3">

                <label>Current Longitude</label>

                <input
                    type="number"
                    class="form-control"
                    formControlName="currentLng">

            </div>

            <div class="col-md-6 mb-3">

                <label>Status</label>

                <select
                    class="form-control"
                    formControlName="status">

                    <option value="">Select Status</option>
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="MAINTENANCE">MAINTENANCE</option>
                    <option value="INACTIVE">INACTIVE</option>

                </select>

            </div>

            <div class="col-md-6 mb-3">

                <label>Driver ID</label>

                <input
                    type="number"
                    class="form-control"
                    formControlName="driverId">

            </div>

            <div class="col-md-6 mb-3">

                <label>Route ID</label>

                <input
                    type="number"
                    class="form-control"
                    formControlName="routeId">

            </div>

            <div class="col-md-6 mb-3">

                <label>Speed</label>

                <input
                    type="number"
                    class="form-control"
                    formControlName="speed">

            </div>

            <div class="col-md-6 mb-3">

                <label>Current Stop</label>

                <input
                    type="text"
                    class="form-control"
                    formControlName="currentStop">

            </div>

            <div class="col-md-6 mb-3">

                <label>Next Stop</label>

                <input
                    type="text"
                    class="form-control"
                    formControlName="nextStop">

            </div>

        </div>

        <button
            class="btn btn-success"
            type="button"
            (click)="saveBus()">

            Save Bus

        </button>

    </form>

    </div>

</div>
