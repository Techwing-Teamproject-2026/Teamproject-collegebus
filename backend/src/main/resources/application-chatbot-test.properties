# Server Configuration
server.port=8085

# Exclude DB / JPA / Repository Auto-configurations for this profile
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,org.springframework.boot.data.jpa.autoconfigure.JpaRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.sql.init.DataSourceInitializationAutoConfiguration
spring.boot.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,org.springframework.boot.data.jpa.autoconfigure.JpaRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.sql.init.DataSourceInitializationAutoConfiguration

# Disable Spring Data JPA repository scanning
spring.data.jpa.repositories.enabled=false

# GenAI Chatbot Configuration
fastapi.chatbot.url=http://localhost:8000/api/v1/student-bus-chat
fastapi.chatbot.connectTimeoutMs=5000
fastapi.chatbot.readTimeoutMs=5000
