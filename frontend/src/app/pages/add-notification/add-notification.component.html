<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="m-0">
                <i class="bi bi-bell-fill"></i>
                Send Notification
            </h3>
            <button class="btn btn-secondary btn-sm" routerLink="/notifications">
                <i class="bi bi-arrow-left"></i> Back to Notifications
            </button>
        </div>

        <div class="card-body">

            <form [formGroup]="notificationForm" (ngSubmit)="saveNotification()">

                <!-- Recipient -->

                <div class="mb-4">

                    <label class="form-label fw-bold">Send To</label>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="allStudents" name="recipient" [value]="'ALL'"
                            [(ngModel)]="recipientType" [ngModelOptions]="{standalone:true}"
                            (change)="recipientChanged('ALL')">

                        <label class="form-check-label" for="allStudents">
                            All Students
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="particularStudent" name="recipient"
                            [value]="'STUDENT'" [(ngModel)]="recipientType" [ngModelOptions]="{standalone:true}"
                            (change)="recipientChanged('STUDENT')">

                        <label class="form-check-label" for="particularStudent">
                            Particular Student
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="particularBus" name="recipient" [value]="'BUS'"
                            [(ngModel)]="recipientType" [ngModelOptions]="{standalone:true}"
                            (change)="recipientChanged('BUS')">

                        <label class="form-check-label" for="particularBus">
                            Particular Bus
                        </label>
                    </div>

                </div>

                <!-- Student -->

                <div class="mb-3" *ngIf="recipientType === 'STUDENT'">

                    <label class="form-label">
                        Select Student
                    </label>

                    <select class="form-select" formControlName="studentId">

                        <option value="">-- Select Student --</option>

                        <option *ngFor="let student of students" [value]="student.studentId">

                            {{ student.name }}

                        </option>

                    </select>

                    <div class="text-danger mt-1" *ngIf="notificationForm.get('studentId')?.touched &&
                               notificationForm.get('studentId')?.hasError('required')">

                        Student selection is required.

                    </div>

                </div>

                <!-- Bus -->

                <div class="mb-3" *ngIf="recipientType === 'BUS'">

                    <label class="form-label">
                        Select Bus
                    </label>

                    <select class="form-select" formControlName="busId">

                        <option value="">-- Select Bus --</option>

                        <option *ngFor="let bus of buses" [value]="bus.busId">

                            {{ bus.busNo }}

                        </option>

                    </select>

                    <div class="text-danger mt-1" *ngIf="notificationForm.get('busId')?.touched &&
                               notificationForm.get('busId')?.hasError('required')">

                        Bus selection is required.

                    </div>

                </div>

                <!-- Title -->

                <div class="mb-3">

                    <label class="form-label">
                        Notification Title
                    </label>

                    <input type="text" class="form-control" formControlName="title">

                    <div class="text-danger mt-1" *ngIf="notificationForm.get('title')?.touched &&
                               notificationForm.get('title')?.hasError('required')">

                        Notification title is required.

                    </div>

                </div>

                <!-- Message -->

                <div class="mb-3">

                    <label class="form-label">
                        Message
                    </label>

                    <textarea rows="5" class="form-control" formControlName="message">
                    </textarea>

                    <div class="text-danger mt-1" *ngIf="notificationForm.get('message')?.touched &&
                               notificationForm.get('message')?.hasError('required')">

                        Notification message is required.

                    </div>

                </div>

                <!-- Notification Type -->

                <div class="mb-4">

                    <label class="form-label">
                        Notification Type
                    </label>

                    <select class="form-select" formControlName="type">

                        <option value="GENERAL">General</option>
                        <option value="ARRIVAL">Arrival</option>
                        <option value="DELAY">Delay</option>
                        <option value="FULL">Bus Full</option>
                        <option value="ALTERNATIVE">Alternative Route</option>

                    </select>

                </div>

                <!-- Buttons -->

                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-success">

                        <i class="bi bi-send-fill"></i>
                        Send Notification

                    </button>

                    <button type="button" class="btn btn-secondary" routerLink="/notifications">

                        <i class="bi bi-x-circle"></i>
                        Cancel

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
